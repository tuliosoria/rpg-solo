<!DOCTYPE html>
<html lang="und">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <link rel="stylesheet" href="splash.css">
</head>
<body>
  <div class="splash-container">
    <div class="logo-container">
      <div class="logo-glow"></div>
      <h1 class="game-title">VARGINHA</h1>
      <h2 class="game-subtitle">TERMINAL 1996</h2>
    </div>
    <div class="loading-container">
      <div class="loading-bar">
        <div class="loading-fill"></div>
      </div>
      <p class="loading-text"></p>
    </div>
    <div class="offline-indicator" id="offline-indicator">
      <span class="offline-icon">⚠</span>
      <span class="offline-text"></span>
    </div>
  </div>
  <script>
    const splashAPI = window.splashAPI;
    const TRANSLATIONS = {
      en: {
        title: 'Loading...',
        offlineMode: 'Offline Mode',
        statuses: {
          'Initializing...': 'Initializing...',
          'Checking network...': 'Checking network...',
          'Connecting to Steam...': 'Connecting to Steam...',
          'Loading game...': 'Loading game...',
          'Ready!': 'Ready!',
        },
      },
      'pt-BR': {
        title: 'Carregando...',
        offlineMode: 'Modo offline',
        statuses: {
          'Initializing...': 'Inicializando...',
          'Checking network...': 'Verificando rede...',
          'Connecting to Steam...': 'Conectando ao Steam...',
          'Loading game...': 'Carregando jogo...',
          'Ready!': 'Pronto!',
        },
      },
      es: {
        title: 'Cargando...',
        offlineMode: 'Modo sin conexión',
        statuses: {
          'Initializing...': 'Inicializando...',
          'Checking network...': 'Comprobando red...',
          'Connecting to Steam...': 'Conectando con Steam...',
          'Loading game...': 'Cargando juego...',
          'Ready!': '¡Listo!',
        },
      },
    };

    function normalizeLanguage(value) {
      if (typeof value !== 'string') {
        return 'en';
      }
      const normalized = value.toLowerCase();
      if (normalized.startsWith('pt')) return 'pt-BR';
      if (normalized.startsWith('es')) return 'es';
      return 'en';
    }

    const currentLanguage = normalizeLanguage(navigator.language);
    const locale = TRANSLATIONS[currentLanguage] || TRANSLATIONS.en;
    const loadingText = document.querySelector('.loading-text');
    const offlineText = document.querySelector('.offline-text');

    function translateStatus(status) {
      return locale.statuses[status] || status;
    }

    document.documentElement.lang = currentLanguage;
    document.title = locale.title;

    if (loadingText) {
      loadingText.textContent = translateStatus('Initializing...');
    }

    if (offlineText) {
      offlineText.textContent = locale.offlineMode;
    }

    splashAPI?.onStatus((status) => {
      if (loadingText) {
        loadingText.textContent = translateStatus(status);
      }
    });

    splashAPI?.onProgress((percent) => {
      const loadingFill = document.querySelector('.loading-fill');
      if (loadingFill) {
        loadingFill.style.width = `${percent}%`;
      }
    });

    splashAPI?.onOffline((isOffline) => {
      const indicator = document.getElementById('offline-indicator');
      if (indicator) {
        indicator.classList.toggle('visible', isOffline);
      }
    });
  </script>
</body>
</html>
